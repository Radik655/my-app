<!DOCTYPE html>
<html>
<head>
    <title>Моё приложение</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <button onclick="like()">Поставить лайк</button>
    <p>Лайков: <span id="like-count">0</span></p>

    <script>
        let count = 0;
        function like() {
            fetch('/like', {method: 'POST'})
                .then(() => {
                    count++;
                    document.getElementById('like-count').innerText = count;
                });
        }
    </script>
</body>
</html>
